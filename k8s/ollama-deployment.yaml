apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: cmpm118
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      volumes:
        - name: ollama-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-svc
  namespace: cmpm118
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
